name: Sync France (RITA)

on:
  schedule:
    - cron: '40 22 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Re-download even if already in the release'
        type: boolean
        default: false
  workflow_call:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get already-uploaded release assets
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="fr-$(date -u +%Y-%m)"
          assets=$(gh release view "$TAG" --json assets --jq '[.assets[].name] | join(",")' 2>/dev/null || echo "")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "assets=$assets" >> "$GITHUB_OUTPUT"
          echo "Existing assets: $assets"

      - name: Download from RITA (Douane FR)
        shell: pwsh
        run: |
          $skipFiles = ('${{ steps.existing.outputs.assets }}' -split ',' | Where-Object { $_ -ne '' })
          $params = @{ OutputFolder = 'downloads/fr'; SkipFiles = $skipFiles }
          if ('${{ inputs.force }}' -eq 'true') { $params['Force'] = $true; $params['SkipFiles'] = @() }
          scripts/sync-fr.ps1 @params

      - name: Publish to release
        if: hashFiles('downloads/fr/*') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="fr-$(date -u +%Y-%m)"

          gh release view "$TAG" 2>/dev/null || \
            gh release create "$TAG" \
              --title "France RITA ${TAG}" \
              --notes "Auto-synced from [RITA (Référentiel Intégré Tarifaire Automatisé)](https://www.douane.gouv.fr/rita-encyclopedie/public/experts/telechargements/init.action). Contains EU TARIC + French national measures (TVA, droits d'accise, autres taxes nationales)."

          EXISTING=$(gh release view "$TAG" --json assets --jq '[.assets[].name]')
          for f in downloads/fr/*; do
            name=$(basename "$f")
            if echo "$EXISTING" | grep -qF "\"$name\""; then
              echo "Already uploaded: $name"
            else
              echo "Uploading: $name"
              gh release upload "$TAG" "$f"
            fi
          done
