name: Sync All Countries

# Manual "run everything now" convenience. Each source has its own daily schedule
# (staggered around 22:00 UTC) so its status badge reflects real runs; this workflow
# is not scheduled to avoid double-running.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  be:
    uses: ./.github/workflows/sync-be.yml
  nl:
    uses: ./.github/workflows/sync-nl.yml
  gb:
    uses: ./.github/workflows/sync-gb.yml
  no:
    uses: ./.github/workflows/sync-no.yml
  se:
    uses: ./.github/workflows/sync-se.yml
  ch:
    uses: ./.github/workflows/sync-ch.yml
  pl:
    uses: ./.github/workflows/sync-pl.yml
  fr:
    uses: ./.github/workflows/sync-fr.yml
  eu:
    uses: ./.github/workflows/sync-eu.yml
  ebti:
    uses: ./.github/workflows/sync-ebti.yml
  us:
    uses: ./.github/workflows/sync-us.yml
  eurlex-meta:
    uses: ./.github/workflows/sync-eurlex-meta.yml
