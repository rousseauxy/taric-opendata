name: Sync Netherlands (DTV)

on:
  schedule:
    - cron: '5 22 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Re-download even if already in the release'
        type: boolean
        default: false
  workflow_call:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get already-uploaded release assets
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="nl-$(date -u +%Y-%m)"
          assets=$(gh release view "$TAG" --json assets --jq '[.assets[].name] | join(",")' 2>/dev/null || echo "")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "assets=$assets" >> "$GITHUB_OUTPUT"
          echo "Existing assets: $assets"

      - name: Download from Belastingdienst DTV
        shell: pwsh
        run: |
          $skipFiles = ('${{ steps.existing.outputs.assets }}' -split ',' | Where-Object { $_ -ne '' })
          $params = @{ OutputFolder = 'downloads/nl'; SkipFiles = $skipFiles }
          if ('${{ inputs.force }}' -eq 'true') { $params['Force'] = $true; $params['SkipFiles'] = @() }
          scripts/sync-nl.ps1 @params

      - name: Publish to release
        if: hashFiles('downloads/nl/*') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="nl-$(date -u +%Y-%m)"

          gh release view "$TAG" 2>/dev/null || \
            gh release create "$TAG" \
              --title "Netherlands DTV ${TAG}" \
              --notes "Auto-synced from the Dutch Belastingdienst [DTV bulk download](https://download.belastingdienst.nl/douane_sw/tariff/download_bestanden.xml). Contains EU TARIC + Dutch national measures (BTW, accijns)."

          # Always re-upload manifest so it stays current; skip other files if already present
          if [ -f downloads/nl/manifest.xml ]; then
            gh release upload "$TAG" downloads/nl/manifest.xml --clobber
          fi

          EXISTING=$(gh release view "$TAG" --json assets --jq '[.assets[].name]')
          for f in downloads/nl/*; do
            name=$(basename "$f")
            [ "$name" = "manifest.xml" ] && continue   # already handled above
            if echo "$EXISTING" | grep -qF "\"$name\""; then
              echo "Already uploaded: $name"
            else
              echo "Uploading: $name"
              gh release upload "$TAG" "$f"
            fi
          done
