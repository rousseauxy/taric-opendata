name: Sync Netherlands (DTV)

on:
  schedule:
    - cron: '0 2 * * *'   # daily 02:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download from Belastingdienst DTV
        shell: pwsh
        run: scripts/sync-nl.ps1 -OutputFolder downloads/nl

      - name: Publish to release
        if: hashFiles('downloads/nl/*') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="nl-$(date -u +%Y-%m)"

          gh release view "$TAG" 2>/dev/null || \
            gh release create "$TAG" \
              --title "Netherlands DTV ${TAG}" \
              --notes "Auto-synced from the Dutch Belastingdienst [DTV bulk download](https://download.belastingdienst.nl/douane_sw/tariff/download_bestanden.xml). Contains EU TARIC + Dutch national measures (BTW, accijns)."

          # Always re-upload manifest so it stays current; skip other files if already present
          if [ -f downloads/nl/manifest.xml ]; then
            gh release upload "$TAG" downloads/nl/manifest.xml --clobber
          fi

          EXISTING=$(gh release view "$TAG" --json assets --jq '[.assets[].name]')
          for f in downloads/nl/*; do
            name=$(basename "$f")
            [ "$name" = "manifest.xml" ] && continue   # already handled above
            if echo "$EXISTING" | grep -qF "\"$name\""; then
              echo "Already uploaded: $name"
            else
              echo "Uploading: $name"
              gh release upload "$TAG" "$f"
            fi
          done
