name: Sync United Kingdom (UKGT)

on:
  schedule:
    - cron: '10 22 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Re-download even if already in the release'
        type: boolean
        default: false
  workflow_call:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get already-uploaded release assets
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="gb-$(date -u +%Y-%m)"
          assets=$(gh release view "$TAG" --json assets --jq '[.assets[].name] | join(",")' 2>/dev/null || echo "")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "assets=$assets" >> "$GITHUB_OUTPUT"
          echo "Existing assets: $assets"

      - name: Download from UK Trade Tariff API
        shell: pwsh
        run: |
          $skipFiles = ('${{ steps.existing.outputs.assets }}' -split ',' | Where-Object { $_ -ne '' })
          $params = @{ OutputFolder = 'downloads/gb'; SkipFiles = $skipFiles }
          if ('${{ inputs.force }}' -eq 'true') { $params['Force'] = $true; $params['SkipFiles'] = @() }
          scripts/sync-gb.ps1 @params

      - name: Publish to release
        if: hashFiles('downloads/gb/*') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="gb-$(date -u +%Y-%m)"

          gh release view "$TAG" 2>/dev/null || \
            gh release create "$TAG" \
              --title "UK Global Tariff ${TAG}" \
              --notes "Auto-synced from the [DBT Data API](https://data.api.trade.gov.uk/v1/datasets/uk-tariff-2021-01-01). Contains all 50 UK Global Tariff tables (commodities, measures, quotas, regulations, certificates, geo areas, footnotes, and more) as CSV. Version is embedded in each filename."

          EXISTING=$(gh release view "$TAG" --json assets --jq '[.assets[].name]')
          for f in downloads/gb/*; do
            name=$(basename "$f")
            if echo "$EXISTING" | grep -qF "\"$name\""; then
              echo "Already uploaded: $name"
            else
              echo "Uploading: $name"
              gh release upload "$TAG" "$f"
            fi
          done
