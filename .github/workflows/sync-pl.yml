name: Sync Poland (ISZTAR4)

on:
  schedule:
    - cron: '35 22 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Re-download even if already in the release'
        type: boolean
        default: false
  workflow_call:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Get already-uploaded release assets
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="pl-$(date -u +%Y)"
          assets=$(gh release view "$TAG" --json assets --jq '[.assets[].name] | join(",")' 2>/dev/null || echo "")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "assets=$assets" >> "$GITHUB_OUTPUT"
          echo "Existing assets: $assets"

      - name: Download ISZTAR4 startup file
        shell: pwsh
        run: |
          $skipFiles = ('${{ steps.existing.outputs.assets }}' -split ',' | Where-Object { $_ -ne '' })
          $params = @{ OutputFolder = 'downloads/pl'; SkipFiles = $skipFiles }
          if ('${{ inputs.force }}' -eq 'true') { $params['Force'] = $true; $params['SkipFiles'] = @() }
          scripts/sync-pl.ps1 @params

      - name: Publish to release
        if: hashFiles('downloads/pl/*.zip') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="pl-$(date -u +%Y)"

          gh release view "$TAG" 2>/dev/null || \
            gh release create "$TAG" \
              --title "Poland ISZTAR4 ${TAG}" \
              --notes "Auto-synced from [ISZTAR4 XmlExtractions](https://ext-isztar4.mf.gov.pl/taryfa_celna/XmlExtractions). Full startup file containing all EU TARIC + Polish national tariff objects (~7.7 GB XML, ~220 MB compressed ZIP). Source: Ministry of Finance (Ministerstwo Finansów) + European Commission DG TAXUD."

          gh release upload "$TAG" downloads/pl/isztar4-base.zip --clobber
