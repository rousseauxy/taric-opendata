name: Sync EUR-Lex legislation (metadata)

on:
  schedule:
    - cron: '55 22 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Rebuild even if unchanged'
        type: boolean
        default: false
  workflow_call:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Fetch stored version marker
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p downloads/eurlex
          MONTH=$(date -u +%Y-%m)
          gh release download "eurlex-$MONTH" --pattern "eurlex-version.txt"  --dir downloads/eurlex 2>/dev/null || true
          gh release download "eurlex-$MONTH" --pattern "cnen-version.txt"    --dir downloads/eurlex 2>/dev/null || true
          gh release download "eurlex-$MONTH" --pattern "cn-notes-version.txt" --dir downloads/eurlex 2>/dev/null || true

      - name: Build manifest from CELLAR SPARQL
        shell: pwsh
        run: |
          $params = @{ OutputFolder = 'downloads/eurlex' }
          if ('${{ inputs.force }}' -eq 'true') { $params['Force'] = $true }
          scripts/sync-eurlex-meta.ps1 @params

      - name: Publish to release
        # Fires when EITHER the manifest OR the CNEN document was (re)written. The manifest
        # early-exits when unchanged, so CNEN can refresh on its own — each file is uploaded
        # only if present.
        if: hashFiles('downloads/eurlex/eurlex-manifest.csv', 'downloads/eurlex/cnen-en.html', 'downloads/eurlex/cn-notes.csv') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MONTH=$(date -u +%Y-%m)
          TAG="eurlex-$MONTH"

          gh release view "$TAG" 2>/dev/null || \
            gh release create "$TAG" \
              --title "EU secondary legislation $MONTH" \
              --notes "Auto-synced from the EU Publications Office [CELLAR](http://publications.europa.eu/webapi/rdf/sparql) SPARQL endpoint. Metadata manifest of ALL EU secondary legislation (CELEX sector 3 — regulations, directives, decisions; ~233k acts): CELEX, title, Official Journal id, document/validity dates, in-force flag, resource type, ELI, and legal-act directory codes. This covers every regulation a TARIC measure can reference (a GeneratingRegulationId always maps to a sector-3 CELEX). Full text is published separately (manually) via the *full* workflow. Also includes cnen-en.html — the consolidated CN Explanatory Notes (CNEN). Updated daily when the work set or CNEN changes."

          if [ -f downloads/eurlex/eurlex-manifest.csv ]; then gh release upload "$TAG" downloads/eurlex/eurlex-manifest.csv --clobber; fi
          if [ -f downloads/eurlex/eurlex-version.txt ];  then gh release upload "$TAG" downloads/eurlex/eurlex-version.txt  --clobber; fi
          if [ -f downloads/eurlex/cnen-en.html ];        then gh release upload "$TAG" downloads/eurlex/cnen-en.html        --clobber; fi
          if [ -f downloads/eurlex/cnen-version.txt ];    then gh release upload "$TAG" downloads/eurlex/cnen-version.txt    --clobber; fi
          if [ -f downloads/eurlex/cn-notes.csv ];        then gh release upload "$TAG" downloads/eurlex/cn-notes.csv        --clobber; fi
          if [ -f downloads/eurlex/cn-notes-version.txt ]; then gh release upload "$TAG" downloads/eurlex/cn-notes-version.txt --clobber; fi
