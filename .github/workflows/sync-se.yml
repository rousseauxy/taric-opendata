name: Sync Sweden (Tulltaxan)

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Re-download even if already in the release'
        type: boolean
        default: false
  workflow_call:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get already-uploaded release assets
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="se-$(date -u +%Y-%m)"
          assets=$(gh release view "$TAG" --json assets --jq '[.assets[].name] | join(",")' 2>/dev/null || echo "")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "assets=$assets" >> "$GITHUB_OUTPUT"
          echo "Existing assets: $assets"

      - name: Download from Tullverket Tariff File Distribution
        shell: pwsh
        run: |
          $skipFiles = ('${{ steps.existing.outputs.assets }}' -split ',' | Where-Object { $_ -ne '' })
          $params = @{ OutputFolder = 'downloads/se'; SkipFiles = $skipFiles }
          if ('${{ inputs.force }}' -eq 'true') { $params['Force'] = $true; $params['SkipFiles'] = @() }
          scripts/sync-se.ps1 @params

      - name: Publish to release
        if: hashFiles('downloads/se/*') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="se-$(date -u +%Y-%m)"

          gh release view "$TAG" 2>/dev/null || \
            gh release create "$TAG" \
              --title "Sweden Tulltaxan ${TAG}" \
              --notes "Auto-synced from [Tullverket Tariff File Distribution](https://distr.tullverket.se/tulltaxan). Full snapshot (xml/tot/) — AdditionalCode, Certificate, CodeList, DeclarableGoodsNomenclature, DutyExpression, Footnote, GeographicalArea, GoodsNomenclature, Measure, and more. Files are delivered as gzipped XML (.xml.gz)."

          EXISTING=$(gh release view "$TAG" --json assets --jq '[.assets[].name]')
          for f in downloads/se/*; do
            name=$(basename "$f")
            if echo "$EXISTING" | grep -qF "\"$name\""; then
              echo "Already uploaded: $name"
            else
              echo "Uploading: $name"
              gh release upload "$TAG" "$f"
            fi
          done
