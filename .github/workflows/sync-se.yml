name: Sync Sweden (Tulltaxan)

on:
  schedule:
    - cron: '0 6 * * *'   # daily 06:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download from Tullverket Tariff File Distribution
        shell: pwsh
        run: scripts/sync-se.ps1 -OutputFolder downloads/se

      - name: Publish to release
        if: hashFiles('downloads/se/*') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="se-$(date -u +%Y-%m)"

          gh release view "$TAG" 2>/dev/null || \
            gh release create "$TAG" \
              --title "Sweden Tulltaxan ${TAG}" \
              --notes "Auto-synced from [Tullverket Tariff File Distribution](https://distr.tullverket.se/tulltaxan). Full snapshot (xml/tot/) — AdditionalCode, Certificate, CodeList, DeclarableGoodsNomenclature, DutyExpression, Footnote, GeographicalArea, GoodsNomenclature, Measure, and more. Files are delivered as gzipped XML (.xml.gz)."

          EXISTING=$(gh release view "$TAG" --json assets --jq '[.assets[].name]')
          for f in downloads/se/*; do
            name=$(basename "$f")
            if echo "$EXISTING" | grep -qF "\"$name\""; then
              echo "Already uploaded: $name"
            else
              echo "Uploading: $name"
              gh release upload "$TAG" "$f"
            fi
          done
